<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Menu</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #222;
        }
        .navbar {
            background: #ff3d00;
            padding: 10px;
        }
        .navbar ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }
        .navbar ul li {
            position: relative;
        }
        .navbar ul li a {
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            display: block;
        }
        .dropdown ul {
            display: none;
            position: absolute;
            background: #ff3d00;
            top: 100%;
            left: 0;
            min-width: 150px;
            padding: 0;
        }
        .dropdown:hover > ul {
            display: block;
        }
        .dropdown ul li {
            position: relative;
        }
        .dropdown ul li ul {
            display: none;
            position: absolute;
            left: 100%;
            top: 0;
            min-width: 150px;
            background: #ff3d00;
        }
        .dropdown ul li:hover > ul {
            display: block;
        }
       ul li :hover{
        background-color: #000000;
       }
    </style>
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="#">Home</a></li>
            <li class="dropdown">
                <a href="#">WordPress</a>
                <ul>
                    <li><a href="#">Themes</a></li>
                    <li><a href="#">Plugins</a></li>
                    <li class="dropdown">
                        <a href="#">Tutorials</a>
                        <ul>
                            <li><a href="#">Stuff</a></li>
                            <li><a href="#">Things</a></li>
                            <li><a href="#">Other Stuff</a></li>
                        </ul>
                    </li>
                </ul>
            </li>
            <li><a href="#">Graphic Design</a></li>
            <li><a href="#">Inspiration</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">About</a></li>
        </ul>
    </nav>
</body>
</html>
